server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets — cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable, stale-if-error=2592000";
    }

    # index.html — short cache, long stale fallback
    location = /index.html {
        add_header Cache-Control "public, max-age=60, stale-if-error=604800";
    }
}